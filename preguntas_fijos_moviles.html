<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formulario de Validación - Servicios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        /* Contenedor principal tipo tarjeta */
        .form-container {
            max-width: 780px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Encabezado */
        .form-header {
            background: #0b2b40;
            padding: 1.8rem 2rem;
            color: white;
        }

        .form-header h1 {
            font-weight: 600;
            font-size: 1.7rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .form-header p {
            margin-top: 0.5rem;
            opacity: 0.85;
            font-size: 0.9rem;
        }

        /* cuerpo del formulario */
        .form-body {
            padding: 2rem 2rem 1.8rem;
        }

        /* cada grupo de pregunta */
        .question-group {
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 1.2rem;
        }

        .question-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e2f3e;
            display: block;
            margin-bottom: 0.6rem;
            letter-spacing: -0.2px;
        }

        .question-group label .required-mock {
            color: #c44536;
            font-weight: normal;
            font-size: 0.8rem;
        }

        textarea, input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fefefe;
            transition: all 0.2s;
            resize: vertical;
            outline: none;
        }

        textarea:focus, input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: white;
        }

        /* caja de texto personalizada: igual para todas */
        .caja-texto {
            width: 100%;
        }

        /* grupo de botones */
        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0 1.2rem;
            justify-content: center;
        }

        button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #f1f5f9;
            border: none;
            padding: 0.75rem 1.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 2.5rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-family: inherit;
        }

        button i {
            font-style: normal;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-primary {
            background: #0f3b4d;
            color: white;
            box-shadow: 0 4px 8px rgba(15, 59, 77, 0.2);
        }

        .btn-primary:hover {
            background: #0a2c3a;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #eef2ff;
            color: #1e40af;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e0e7ff;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        /* pie de formulario */
        .form-footer {
            background: #f8fafc;
            border-top: 1px solid #e2edf2;
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #5b6e8c;
        }

        /* mensaje flotante */
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a3e;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            background: rgba(15, 25, 35, 0.9);
        }

        @media (max-width: 550px) {
            .form-body {
                padding: 1.5rem;
            }
            button {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1>
            <span>📋</span> Formulario de verificación
        </h1>
        <p>Complete los campos según la información solicitada.</p>
    </div>

    <div class="form-body">
        <!-- 1. Nombre del titular -->
        <div class="question-group">
            <label>📝 Nombre del titular <span class="required-mock"></span></label>
            <textarea class="caja-texto" id="campoNombre" rows="1" placeholder=" "></textarea>
        </div>

        <!-- 2. Pago de 2 últimas facturas ¿por qué medio lo realizó? -->
        <div class="question-group">
            <label>💳 El pago de sus 2 últimas facturas, ¿por qué medio lo realizó?</label>
            <textarea class="caja-texto" id="campoMedioPago" rows="1" placeholder="Ej: ventanilla o débito"></textarea>
        </div>

        <!-- 3. Cuáles son sus 4 últimos dígitos de su tarjeta de débito o crédito -->
        <div class="question-group">
            <label>💎 ¿Cuáles son sus 4 últimos dígitos de su tarjeta de débito o crédito? (Dependiendo el medio de pago)</label>
            <textarea class="caja-texto" id="campoUltimosDigitos" rows="1" placeholder="Ej: 4582"></textarea>
        </div>

        <!-- 4. En los últimos 3 meses, ¿usted ha activado algún paquete adicional en su servicio? -->
        <div class="question-group">
            <label>📦 En los últimos 3 meses, ¿usted ha activado algún paquete adicional en su servicio?</label>
            <textarea class="caja-texto" id="campoPaqueteAdicional" rows="1" placeholder="Ej: Sí / NO"></textarea>
        </div>

        <!-- 5. últimos 3 dígitos certificado de votación últimas elecciones -->
        <div class="question-group">
            <label>🗳️ Por favor, indíqueme los últimos 3 dígitos de su certificado de votación de las últimas elecciones.</label>
            <textarea class="caja-texto" id="campoCedulaVotacion" rows="1" placeholder="Ej: 123"></textarea>
        </div>

        <!-- 6. Dirección exacta instalación del servicio -->
        <div class="question-group">
            <label>📍 Por favor, confirme la dirección exacta donde está instalado el servicio.</label>
            <textarea class="caja-texto" id="campoDireccion" rows="2" placeholder="Calle, número, colonia, ciudad, código postal..."></textarea>
        </div>

        <!-- BARRA DE BOTONES -->
        <div class="actions-bar">
            <button id="btnGuardarTxt" class="btn-primary">
                <i>💾</i> Guardar en .txt
            </button>
            <button id="btnCopiar" class="btn-secondary">
                <i>📋</i> Copiar respuestas
            </button>
            <button id="btnLimpiar" class="btn-danger">
                <i>🧹</i> Limpiar todo
            </button>
        </div>
        <div style="font-size: 0.7rem; text-align: center; margin-top: 0.5rem; color: #6c86a3;">
            *
        </div>
    </div>
    <div class="form-footer">
        -
    </div>
</div>

<div id="toastMsg" class="toast-msg">✅ Mensaje</div>

<script>
    (function() {
        // Referencias a los campos (todos textarea)
        const campoNombre = document.getElementById('campoNombre');
        const campoMedioPago = document.getElementById('campoMedioPago');
        const campoUltimosDigitos = document.getElementById('campoUltimosDigitos');
        const campoPaqueteAdicional = document.getElementById('campoPaqueteAdicional');
        const campoCedulaVotacion = document.getElementById('campoCedulaVotacion');
        const campoDireccion = document.getElementById('campoDireccion');

        // Elemento para notificaciones
        const toast = document.getElementById('toastMsg');

        // Función para mostrar mensaje emergente
        function mostrarMensaje(texto, esError = false) {
            toast.textContent = texto;
            toast.style.backgroundColor = esError ? 'rgba(180, 40, 40, 0.92)' : 'rgba(15, 59, 77, 0.95)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2400);
        }

        // Obtener todas las respuestas como objeto clave/valor (para archivo y copia)
        function obtenerDatosFormulario() {
            return {
                "Nombre del titular": campoNombre.value.trim() || "[No especificado]",
                "El pago de sus 2 últimas facturas, ¿por qué medio lo realizó?": campoMedioPago.value.trim() || "[No especificado]",
                "¿Cuáles son sus 4 últimos dígitos de su tarjeta de débito o crédito? (Dependiendo el medio de pago)": campoUltimosDigitos.value.trim() || "[No especificado]",
                "En los últimos 3 meses, ¿usted ha activado algún paquete adicional en su servicio?": campoPaqueteAdicional.value.trim() || "[No especificado]",
                "Por favor, indíqueme los últimos 3 dígitos de su certificado de votación de las últimas elecciones.": campoCedulaVotacion.value.trim() || "[No especificado]",
                "Por favor, confirme la dirección exacta donde está instalado el servicio.": campoDireccion.value.trim() || "[No especificado]"
            };
        }

        // Generar texto plano formateado para archivo .txt o copiar
        function generarTextoFormateado() {
            const datos = obtenerDatosFormulario();
            let contenido = "===== PREGUNTAS DE VALIDACIÓN: =====\n";
            contenido += `📅 Fecha de generación: ${new Date().toLocaleString()}\n`;
            contenido += "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n";
            for (const [pregunta, respuesta] of Object.entries(datos)) {
                contenido += `❓ ${pregunta}\n`;
                contenido += `➡️ Respuesta: ${respuesta}\n`;
                contenido += `---------------------------------------------\n`;
            }
            contenido += `\n\n`;
            return contenido;
        }

        // 1) GUARDAR COMO ARCHIVO .TXT
        function guardarComoTxt() {
            const contenido = generarTextoFormateado();
            // Verificar que haya al menos algún campo con contenido real (opcional)
            const datos = obtenerDatosFormulario();
            const hayAlgunaRespuesta = Object.values(datos).some(val => val !== "[No especificado]");
            if (!hayAlgunaRespuesta) {
                mostrarMensaje("⚠️ No hay datos para guardar. Escribe algo antes de guardar.", true);
                return;
            }

            try {
                // Crear blob y descargar
                const blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.href = url;
                // Nombre del archivo con timestamp
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, "-");
                link.download = `formulario_respuestas_${timestamp}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                mostrarMensaje("✅ Archivo .txt guardado correctamente");
            } catch (error) {
                console.error(error);
                mostrarMensaje("❌ Error al generar el archivo", true);
            }
        }

        // 2) COPIAR RESPUESTAS AL PORTAPAPELES (texto completo)
        async function copiarRespuestas() {
            const contenido = generarTextoFormateado();
            try {
                await navigator.clipboard.writeText(contenido);
                mostrarMensaje("📋 Respuestas copiadas al portapapeles");
            } catch (err) {
                // Fallback para navegadores antiguos
                const textareaTemp = document.createElement("textarea");
                textareaTemp.value = contenido;
                document.body.appendChild(textareaTemp);
                textareaTemp.select();
                document.execCommand("copy");
                document.body.removeChild(textareaTemp);
                mostrarMensaje("📋 Copiado (método alternativo)");
            }
        }

        // 3) LIMPIAR TODOS LOS CAMPOS (textarea)
        function limpiarFormulario() {
            // Confirmación simple pero amigable
            if (confirm("¿Estás seguro de limpiar todos los campos? Se perderán los datos no guardados.")) {
                campoNombre.value = "";
                campoMedioPago.value = "";
                campoUltimosDigitos.value = "";
                campoPaqueteAdicional.value = "";
                campoCedulaVotacion.value = "";
                campoDireccion.value = "";
                mostrarMensaje("🧹 Todos los campos han sido limpiados");
                // Opcional: focus en el primer campo
                campoNombre.focus();
            } else {
                mostrarMensaje("Acción cancelada, los datos permanecen", false);
            }
        }

        // También podríamos agregar atajos de teclado o autosave opcional? No necesario.
        // Asociar eventos a los botones
        const btnGuardar = document.getElementById('btnGuardarTxt');
        const btnCopiar = document.getElementById('btnCopiar');
        const btnLimpiar = document.getElementById('btnLimpiar');

        if (btnGuardar) btnGuardar.addEventListener('click', guardarComoTxt);
        if (btnCopiar) btnCopiar.addEventListener('click', copiarRespuestas);
        if (btnLimpiar) btnLimpiar.addEventListener('click', limpiarFormulario);

        // Pequeño detalle: permitir que al presionar Ctrl+Enter (opcional) en cualquier campo se pueda copiar? no necesario
        // pero mostramos robustez

        // Comprobar si el navegador soporta clipboard de manera amigable (sin errores)
        if (!navigator.clipboard) {
            console.warn("Clipboard API no soportada, se usará fallback");
        }

        // Inyectar un poco de estilo a los textarea para que se vean más como "cajas de texto"
        // ya lo está. Si algún usuario requiere atributos adicionales: 
        // Podemos añadir un placeholder visual pero todo listo.
    })();
</script>
</body>
</html>
