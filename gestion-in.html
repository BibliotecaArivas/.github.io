<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión IN</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg,#05070c,#0a0f1a);
    color:#fff;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

textarea{
    width:100%;
    min-height:520px;
    background:#11141c;
    border:1px solid #1f2633;
    color:#e6edf3;
    padding:20px;
    border-radius:8px;
    font-size:14px;
    line-height:1.6;
    resize:vertical;
    outline:none;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

textarea:focus{
    border-color:#3b82f6;
}

.actions{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

button{
    border:none;
    padding:12px 22px;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:0.25s;
}

.copy{
    background:#3b82f6;
    color:#fff;
}

.copy:hover{
    background:#2563eb;
}

.save{
    background:#1f2633;
    color:#fff;
}

.save:hover{
    background:#2b3444;
}

/* NOTIFICACION TOAST */

.toast{
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #1f2633;
    color: #fff;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(20px);
    transition: all .4s ease;
    border-left: 4px solid #3b82f6;
}

.toast.show{
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<div class="container">

<h1>Gestión IN</h1>

<textarea id="contenido">
CAMPAÑA: SWAT
USUARIO: AFRIVAS
DAS: TECHCOM
TIPO DE GESTIÓN: IN / OUT
FECHA DE GESTIÓN:
HORA DE GESTIÓN:
ANILLAMADOR / ID:
CÉDULA:
NOMBRE:
ACTUALIZACIÓN DE DATOS:
SERVICIO:
QUEJA:

MOTIVO LLAMADA:

GESTIÓN DE LA LLAMADA:

PREGUNTAS VALIDACIÓN:
</textarea>

<div class="actions">

<button class="copy" onclick="copiarTexto()">
📋 Copiar
</button>

<button class="save" onclick="guardarTXT()">
⬇ Guardar TXT
</button>

</div>

</div>

<div id="toast" class="toast">Texto copiado</div>

<script>

function mostrarToast(mensaje){

const toast = document.getElementById("toast");

toast.textContent = mensaje;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2500);

}

function copiarTexto(){

const textarea = document.getElementById("contenido");

navigator.clipboard.writeText(textarea.value);

mostrarToast("📋 Texto copiado al portapapeles");

}

function guardarTXT(){

const texto = document.getElementById("contenido").value;

const fecha = new Date();

const nombreArchivo =
`gestion_${fecha.getFullYear()}-${fecha.getMonth()+1}-${fecha.getDate()}_${fecha.getHours()}-${fecha.getMinutes()}.txt`;

const blob = new Blob([texto], {type:"text/plain;charset=utf-8;"});

const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = nombreArchivo;
a.click();

URL.revokeObjectURL(url);

mostrarToast("💾 Archivo TXT guardado");

}

</script>

</body>
</html>
```
